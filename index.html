<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Ticketing System</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="chatbot-container">
        <div class="chat-header">
            <div class="flex items-center gap-4">
                <div class="avatar bg-gray-800 text-purple-400">🤖</div>
                <h2 class="text-4xl font-bold">CineBot</h2>
            </div>
            <div class="flex items-center gap-4">
                <button id="theme-toggle-btn"
                    class="text-xl p-2 rounded-full hover:bg-white/10 transition-colors">☀️</button>
                <button id="history-btn"
                    class="text-sm bg-gray-700 hover:bg-gray-600 text-white py-1 px-3 rounded-full transition-colors">History</button>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-400 cursor-pointer" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                </svg>
            </div>
        </div>
        <div class="chat-messages" id="chat-messages">
            <!-- Messages will be appended here by JavaScript -->
        </div>
        <div id="typing-indicator" class="typing-indicator">
            <span class="typing-text">CineBot is typing</span>
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
        </div>
        <div class="chat-input-area">
            <button id="mic-btn" class="mr-2 text-gray-400 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
            </button>
            <input type="text" id="user-input" class="chat-input" placeholder="Type a message...">
            <button id="send-btn" class="send-button">Send</button>
        </div>
    </div>

    <!-- Custom Message Box -->
    <div id="message-box" class="message-box">
        <h3 id="message-title"></h3>
        <p id="message-body"></p>
        <button id="message-ok-btn">OK</button>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- New Congratulations Overlay -->
    <div id="congrats-overlay" class="congrats-overlay">
        <h1 class="congrats-text">Congratulations!</h1>
        <p class="congrats-subtext">Your booking is confirmed.</p>
    </div>

    <!-- History Modal -->
    <div id="history-modal" class="message-box" style="max-width: 600px; width: 90%;">
        <h3 class="text-xl font-bold mb-4">Booking History</h3>
        <div id="history-content" class="text-left max-h-96 overflow-y-auto mb-4 text-sm text-gray-300">
            <!-- History items will be injected here -->
        </div>
        <button id="close-history-btn">Close</button>
    </div>

    <!-- jsPDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Main Script -->
    <script src="script.js"></script>

</body>

</html>
